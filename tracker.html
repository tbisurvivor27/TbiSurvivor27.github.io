<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Tracker — TBI Survivor</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lora:ital,wght@0,400;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0a1628;
      --rust: #c45c2a;
      --gold: #d4a843;
      --foam: #c8dfe8;
    }
    body {
      background: var(--navy);
      color: var(--foam);
      font-family: 'Source Sans 3', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      margin-bottom: 2rem;
      opacity: 0.8;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: 0.05em;
      color: var(--foam);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    h1 span { color: var(--rust); }
    .subline {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--foam);
      opacity: 0.7;
      margin-bottom: 2rem;
      max-width: 420px;
    }
    .image-wrap {
      margin: 1.5rem auto;
      max-width: 420px;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 2px solid rgba(212,168,67,0.2);
    }
    .image-wrap img {
      width: 100%;
      display: block;
    }
    .caption {
      font-family: 'Lora', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--gold);
      opacity: 0.7;
      margin-top: 1rem;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border-radius: 4px;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.2s;
      margin: 0.5rem;
    }
    .btn-primary {
      background: var(--rust);
      color: white;
    }
    .btn-primary:hover { background: #d96830; transform: translateY(-2px); }
    .btn-outline {
      border: 1px solid rgba(200,223,232,0.3);
      color: var(--foam);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
    .launch-badge {
      display: inline-block;
      background: rgba(212,168,67,0.1);
      border: 1px solid rgba(212,168,67,0.3);
      color: var(--gold);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.4rem 1.2rem;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="logo">TBI SURVIVOR LLC</div>
  <div class="launch-badge">⚓ Boat Launch: April 9th</div>
  <h1>Boat is Still <span>on Land!</span></h1>
  <p class="subline">The tracker goes live when she hits the water. Check back after April 9th!</p>
